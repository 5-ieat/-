<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>画像変換サイト</title>
    <link rel="stylesheet" href="https://pyscript.net/releases/2024.1.1/core.css" />
    <script type="module" src="https://pyscript.net/releases/2024.1.1/core.js"></script>
    <style>
        body { font-family: sans-serif; text-align: center; background: #f0f0f0; padding: 20px; }
        .controls { background: white; padding: 15px; border-radius: 10px; display: inline-block; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .preview { margin-top: 20px; }
        canvas { display: none; }
        img { max-width: 80%; border: 1px solid #ccc; }
    </style>
</head>
<body>

<div class="controls">
    <h3>画像変換サイト</h3>
    <input type="file" id="file_upload" accept="image/*"><br><br>
    
    <label>モザイク度 (0-7): </label>
    <input type="range" id="mosaic_scale" min="0" max="7" value="0"><br>
    
    <input type="checkbox" id="dark_mode"> ダークモード
    <input type="checkbox" id="sirokuro_mode"> 白黒モード<br><br>
    
    <label>かぶせる色: </label>
    <input type="color" id="color_picker" value="#ff0000">
    <button id="reset_color">色を初期化</button><br><br>

    <label>保存形式:</label>
    <input type="radio" name="file_format" value="PNG" checked> PNG
    <input type="radio" name="file_format" value="JPEG"> JPG
    
    <input type="text" id="file_name" placeholder="保存ファイル名" value="new_image"><br><br>
    <button id="process_btn" style="padding: 10px 20px; background: #007bff; color: white; border: none; border-radius: 5px;">変換して保存</button>
</div>

<py-config>
    packages = ["Pillow"]
</py-config>

<script type="py">
import io
import base64
import asyncio
from pyscript import document, window
from PIL import Image
from pyodide.ffi import create_proxy

selected_rgb = None

async def run_process(event=None):
    global selected_rgb
    
    file_list = document.querySelector("#file_upload").files
    if len(file_list) == 0:
        return

    # 設定の取得
    mosaic_val = int(document.querySelector("#mosaic_scale").value)
    dark_mode = document.querySelector("#dark_mode").checked
    sirokuro_mode = document.querySelector("#sirokuro_mode").checked

    # 画像の読み込み
    file = file_list.item(0)
    array_buffer = await file.arrayBuffer()
    img = Image.open(io.BytesIO(array_buffer.to_bytes())).convert("RGBA")
    w, h = img.size

    # 1. モザイク処理
    if mosaic_val > 0:
        c = 2**(9 - (mosaic_val + 1))
        f, g = int(w/(300/c)), int(h/(300/c))
        if f > 0 and g > 0:
            img = img.resize((f, g), resample=Image.NEAREST).resize((w, h), resample=Image.NEAREST)

    # 2. 色をかぶせる
    if selected_rgb:
        alpha = 100
        color_layer = Image.new("RGBA", img.size, selected_rgb + (alpha,))
        img = Image.alpha_composite(img, color_layer)

    # 3. ダークモード・白黒モード
    if dark_mode:
        if sirokuro_mode:
            img = img.convert("L").convert("1")
        else:
            img = img.convert("L")
    elif sirokuro_mode:
        img = img.convert("1")

    # 保存形式の取得
    format_elements = document.querySelectorAll("input[name='file_format']")
    selected_format = "PNG"
    for el in format_elements:
        if el.checked:
            selected_format = el.value

    # 画像の書き出し準備
    buffered = io.BytesIO()
    if selected_format == "JPEG":
        rgb_img = Image.new("RGB", img.size, (255, 255, 255))
        rgb_img.paste(img, mask=img.split()[3] if img.mode == 'RGBA' else None)
        mime_type = "image/jpeg"
    else:
        img.save(buffered, format="PNG")
        mime_type = "image/png"

    # プレビューの更新
    img_str = base64.b64encode(buffered.getvalue()).decode()
    src_data = f"data:{mime_type};base64,{img_str}"
    document.querySelector("#output_image").src = src_data
    return src_data

async def download_image(event=None):
    img_src = document.querySelector("#output_image").src
    if not img_src or img_src == "": return
    
    file_name = document.querySelector("#file_name").value
    ext = ".jpg" if "image/jpeg" in img_src else ".png"
    
    link = document.createElement("a")
    link.href = img_src
    link.download = f"{file_name}{ext}"

def update_color_picker_style():
    """色が初期状態のときに斜線を入れる"""
    style_target = document.querySelector("#color_picker")
    if selected_rgb is None:
        style_target.style.background = "linear-gradient(45deg, #fff 45%, #ff0000 50%, #fff 55%)"
        style_target.style.border = "1px solid #ccc"
    else:
        style_target.style.background = "none"

async def auto_update_and_save(event):
    """自動でプレビューして保存する"""
    await run_process(event)
    await download_image(event)

def set_color(event):
    global selected_rgb
    hex_val = event.target.value.lstrip('#')
    selected_rgb = tuple(int(hex_val[i:i+2], 16) for i in (0, 2, 4))
    update_color_picker_style()
    asyncio.create_task(auto_update_and_save(event))

def reset_color(event):
    global selected_rgb
    selected_rgb = None
    update_color_picker_style()
    asyncio.create_task(auto_update_and_save(event))

# --- イベント登録 ---
proxy_auto = create_proxy(auto_update_and_save)

# 入力項目への登録
document.querySelector("#file_upload").addEventListener("change", proxy_auto)
document.querySelector("#mosaic_scale").addEventListener("input", proxy_auto)
document.querySelector("#dark_mode").addEventListener("change", proxy_auto)
document.querySelector("#sirokuro_mode").addEventListener("change", proxy_auto)
for el in document.querySelectorAll("input[name='file_format']"):
    el.addEventListener("change", proxy_auto)

# 色関連
document.querySelector("#color_picker").addEventListener("input", create_proxy(set_color))
document.querySelector("#reset_color").onclick = create_proxy(reset_color)

# 保存ボタン（手動）
document.querySelector("#process_btn").onclick = proxy_auto

# 初期スタイル適用
update_color_picker_style()
</script>

</body>
</html>
